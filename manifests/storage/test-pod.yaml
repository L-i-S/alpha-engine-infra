apiVersion: v1
kind: Pod
metadata:
  name: pvc-test
  namespace: alpha-engine-db

spec:
  containers:
    - name: test
      image: busybox
      command:
        - sh
        - -c
        - "sleep 3600"

      volumeMounts:
        - name: data
          mountPath: /data

  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: postgres-data