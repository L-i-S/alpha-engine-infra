apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alpha-engine-v2
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/L-i-S/alpha-engine-infra.git
    targetRevision: main
    path: helm/alpha-engine

    helm:
      releaseName: alpha-engine-v2
      values: |
        ingress:
          host: alpha-engine-v2.local

  destination:
    server: https://kubernetes.default.svc
    namespace: alpha-engine-v2

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
