kube-prometheus-stack:
  grafana:
    adminUser: admin
    adminPassword: "AlphaEngine2026!"
    additionalDataSources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        isDefault: false
        editable: true

  alertmanager:
    tplConfig: false

    config:
      global:
        resolve_timeout: 5m

      route:
        receiver: "null"
        group_by:
          - alertname
          - namespace
        group_wait: 10s
        group_interval: 5m
        repeat_interval: 3h

        routes:
          - receiver: telegram
            matchers:
              - app = "alpha-engine"
            continue: false

      receivers:
        - name: "null"

        - name: telegram
          telegram_configs:
            - bot_token: "8850547089:AAFJgxS1JlBZDpAhUlznWPHP8AhWQylE1To"
              chat_id: 885371025
              parse_mode: HTML
              send_resolved: true
              message: |-
                {{ if eq .Status "firing" }}🚨 <b>FIRING</b>{{ else }}✅ <b>RESOLVED</b>{{ end }}

                <b>Alert:</b> {{ .CommonLabels.alertname }}
                <b>Severity:</b> {{ .CommonLabels.severity }}
                <b>Application:</b> {{ .CommonLabels.app }}
                <b>Namespace:</b> {{ .CommonLabels.namespace }}

                {{ range .Alerts }}
                <b>Summary:</b> {{ .Annotations.summary }}
                <b>Description:</b> {{ .Annotations.description }}
                {{ end }}