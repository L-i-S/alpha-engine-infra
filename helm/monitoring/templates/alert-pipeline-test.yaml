apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: alpha-engine-alert-pipeline-test
  namespace: {{ .Release.Namespace }}
  labels:
    release: monitoring
spec:
  groups:
    - name: alpha-engine.alert-pipeline-test
      rules:
        - alert: AlphaEngineAlertPipelineTest
          expr: vector(1)
          for: 30s
          labels:
            severity: info
            app: alpha-engine
          annotations:
            summary: "Alpha Engine alert pipeline test"
            description: "Synthetic alert for testing Prometheus, Alertmanager and Telegram."